<head>

        height: 100px;

        left: 80px;

    }

        left: 40px;
        z-index:1 ;

    }
</style>
</head>
<body>
    <section>
        <div class="container">
            <div class="red"> red</div>
             <div class="green"> green</div>
              <div class="blue">blue </div>
        </div>
    </section>
